<nav class="bfo-nav" role="navigation">
  <div class="bfo-nav__inner">
    <a href="{{ .Site.BaseURL }}" class="bfo-nav__brand">
      <img src="{{ "images/logo.svg" | relURL }}" alt="Bare Force One logo" class="bfo-nav__logo" width="32" height="32">
      Bare Force One
    </a>
    <button class="bfo-nav__toggle" aria-label="Toggle menu" aria-expanded="false" onclick="this.setAttribute('aria-expanded',this.getAttribute('aria-expanded')==='false'?'true':'false');this.closest('.bfo-nav').classList.toggle('bfo-nav--open');">
      <span></span><span></span><span></span>
    </button>
    <div class="bfo-nav__links">
      {{ partial "i18nlist.html" . }}
      {{ if .Site.Menus.main }}
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}" title="{{ .Name }} page">{{ .Name }}</a>
        {{ end }}
      {{ end }}
    </div>
  </div>
</nav>
